{% extends "layout.html" %}
{% block content %}
<h2 class="mb-4">Our Products</h2>
<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card h-100 border-0 shadow-sm product-card">
            <img src="{{ product.image_url or 'https://via.placeholder.com/300' }}" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text text-muted small text-truncate">{{ product.description }}</p>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="h5 mb-0 text-primary">₹{{ product.price }}</span>
                    <button onclick="addToCart({{ product.id }})" class="btn btn-primary btn-sm px-3">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
