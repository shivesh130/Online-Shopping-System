{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3 text-center">
                <h5 class="mb-0">Publish New Product</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="{{ url_for('add_product') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">PRODUCT NAME</label>
                        <input type="text" name="name" class="form-control bg-light border-0" placeholder="Enter product name" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">PRICE (INR)</label>
                            <input type="number" name="price" step="0.01" class="form-control bg-light border-0" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">INITIAL STOCK</label>
                            <input type="number" name="stock" class="form-control bg-light border-0" placeholder="10" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">IMAGE URL</label>
                        <input type="url" name="image_url" class="form-control bg-light border-0" placeholder="https://...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">DESCRIPTION</label>
                        <textarea name="description" class="form-control bg-light border-0" rows="4" placeholder="Brief details about the product..."></textarea>
                    </div>

                    <div class="d-grid gap-2 pt-3">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">
                            Add to Inventory
                        </button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-link text-muted">
                            Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
