<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | UrbanMart</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/orders.css">
  <link rel="stylesheet" href="../css/footer.css">
</head>
<body style="background-color: #FAFAF7;">

  <div class="nav-backdrop" id="navBackdrop" onclick="closeAll()"></div>

  <!-- Main Navigation -->
  <nav class="navbar shadow-sm bg-white fixed-top">
    <div class="container">
      <div class="navbar-inner w-100 d-flex justify-content-between align-items-center py-2">
        <a class="navbar-brand fw-bold" href="../../index.html" style="display:flex;align-items:center;gap:0;text-decoration:none;">
          <svg width="148" height="36" viewBox="0 0 148 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <rect x="2" y="10" width="22" height="20" rx="3.5" fill="#5A8A5A" />
            <path d="M8 10 C8 6.5 10.5 4 13 4 C15.5 4 18 6.5 18 10" stroke="#5A8A5A" stroke-width="2.2" stroke-linecap="round" fill="none" />
            <path d="M9 17 L17 17" stroke="white" stroke-width="1.8" stroke-linecap="round" />
            <circle cx="9.5" cy="17" r="1.2" fill="white" />
            <circle cx="16.5" cy="17" r="1.2" fill="white" />
            <text x="29" y="24" font-family="'Lora', Georgia, serif" font-weight="700" font-size="15.5" fill="#1A1A1A" letter-spacing="-0.3">Urban</text>
            <text x="80" y="24" font-family="'Lora', Georgia, serif" font-weight="700" font-size="15.5" fill="#5A8A5A" letter-spacing="-0.3">mart</text>
            <circle cx="144" cy="23" r="2.5" fill="#5A8A5A" />
          </svg>
        </a>
        <div class="nav-right d-flex align-items-center gap-3">
          <button class="nav-icon-btn btn btn-light rounded-circle" onclick="window.location.href='cart.html'" title="Cart">
            <i class="bi bi-cart3 fs-5"></i>
          </button>
          <a class="btn btn-outline-success rounded-pill px-4 fw-bold" href="login.html"><i class="bi bi-person-circle me-2"></i>Profile</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Orders Content -->
  <section class="orders-w pt-5 mt-5">
    <div class="container py-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../../index.html" class="text-decoration-none color-nature">Home</a></li>
          <li class="breadcrumb-item"><a href="account.html" class="text-decoration-none color-nature">Account</a></li>
          <li class="breadcrumb-item active" aria-current="page">My Orders</li>
        </ol>
      </nav>

      <div class="d-flex align-items-center mb-5">
        <h2 class="fw-bold mb-0 text-dark" style="font-family: 'Lora', serif; font-size: 2.5rem;">Order History</h2>
        <span class="badge bg-success ms-3 px-3 py-2 rounded-pill fs-6 shadow-sm" id="orderCountBadge" style="background-color: #5A8A5A !important;">0 Orders</span>
      </div>
      
      <div class="row justify-content-center">
        <div class="col-lg-10">
            <div id="ordersContainer">
               <!-- Loading indicator -->
               <div class="text-center py-5">
                  <div class="spinner-border color-nature" style="color: #5A8A5A; width: 3rem; height: 3rem;" role="status">
                      <span class="visually-hidden">Loading...</span>
                  </div>
                  <h5 class="mt-3 text-muted fw-bold">Fetching your orders...</h5>
               </div>
            </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="../js/orders.js"></script>
  <script>
      AOS.init({ once: true });
  </script>
</body>
</html>
